name: tatuzin-backend-prod

services:
  backend:
    image: ${BACKEND_IMAGE:-tatuzin-backend:prod-local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL}
      ALLOW_INITIAL_BOOTSTRAP: ${ALLOW_INITIAL_BOOTSTRAP}
      APP_ENV: ${APP_ENV}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      HOST: ${HOST}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_FROM_AUTH: ${MAIL_FROM_AUTH}
      MAIL_REPLY_TO_SUPPORT: ${MAIL_REPLY_TO_SUPPORT}
      NODE_ENV: production
      PASSWORD_RESET_APP_BASE_URL: ${PASSWORD_RESET_APP_BASE_URL}
      PASSWORD_RESET_DEBUG_LOG_TOKEN: ${PASSWORD_RESET_DEBUG_LOG_TOKEN}
      PASSWORD_RESET_TOKEN_TTL_MINUTES: ${PASSWORD_RESET_TOKEN_TTL_MINUTES}
      PLATFORM_JOB_SWEEP_INTERVAL_MS: ${PLATFORM_JOB_SWEEP_INTERVAL_MS}
      PORT: ${PORT}
      RATE_LIMIT_BUCKET_RETENTION_MINUTES: ${RATE_LIMIT_BUCKET_RETENTION_MINUTES}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS}
      SESSION_CLEANUP_RETENTION_DAYS: ${SESSION_CLEANUP_RETENTION_DAYS}
      TRUST_PROXY: ${TRUST_PROXY}
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:${BACKEND_BIND_PORT:-4000}:4000"
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${PORT:-4000}/api/readiness >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - edge

  edge:
    image: caddy:2-alpine
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - edge

volumes:
  caddy_data:
  caddy_config:

networks:
  edge:
