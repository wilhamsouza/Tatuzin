name: erp_pdv_app
description: ERP/PDV offline-first Flutter app for small businesses
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^12.1.3
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.12.0
  share_plus: ^10.1.4
  cross_file: ^0.3.4+2
  file_picker: ^10.3.7
  image_picker: ^1.1.2
  http: ^1.5.0
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
